<!doctype html>
<html lang="zh-Hans">
<head>
  <script>
    (function() {
      try {
        var s = JSON.parse(localStorage.getItem('theme-settings') || '{"mode":"system","lightTheme":"default-light","darkTheme":"default-dark"}');
        var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var id = s.mode === 'light' ? s.lightTheme : s.mode === 'dark' ? s.darkTheme : dark ? s.darkTheme : s.lightTheme;
        document.documentElement.setAttribute('data-theme', id);
        if (id.endsWith('-dark')) document.documentElement.classList.add('dark');
      } catch(e) {}
    })();
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3b5998" />
  <link rel="manifest" href="./manifest.json" />
  <title>社交数据聚合中心</title>

</head>

        <div style="width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#3b5998;border-radius:50%;animation:html-spin .8s linear infinite;margin:0 auto 12px"></div>
        <div style="font-size:13px;color:#94a3b8">Loading...</div>
